<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard — ArCraft</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar('dashboard')}"></div>

    <main class="page-content">
        <h2 class="page-title">Server Overview</h2>

        <!-- Stats Cards -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="label">Total Players</div>
                <div class="value green" th:text="${totalPlayers}">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Total PvP Kills</div>
                <div class="value aqua" th:text="${totalKills}">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Total Mobs Killed</div>
                <div class="value orange" th:text="${totalMobsKilled}">0</div>
            </div>
        </div>

        <!-- Two-column grid -->
        <div class="dashboard-grid">

            <!-- Top 5 Killers -->
            <div class="panel">
                <div class="panel-header">Top 5 — PvP Kills</div>
                <div class="panel-body">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Player</th>
                                <th class="text-right">Kills</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s, iter : ${topKillers}">
                                <td class="rank" th:text="${iter.index + 1}">1</td>
                                <td>
                                    <a class="player-link" th:href="@{/players/{u}(u=${s.player.username})}"
                                       th:text="${s.player.username}">Steve</a>
                                </td>
                                <td class="num text-right" th:text="${s.kills}">0</td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="empty-state" th:if="${#lists.isEmpty(topKillers)}">No data yet.</div>
                </div>
            </div>

            <!-- Recent Events -->
            <div class="panel">
                <div class="panel-header">Recent Events</div>
                <div class="panel-body">
                    <ul class="event-list">
                        <li class="event-item" th:each="e : ${recentEvents}">
                            <div th:class="'event-icon ' + ${
                                e.type.name() == 'PVP_KILL' ? 'pvp' :
                                e.type.name() == 'BOSS_KILL' ? 'boss' :
                                e.type.name() == 'ACHIEVEMENT' ? 'achievement' :
                                e.type.name() == 'SERVER_MILESTONE' ? 'milestone' :
                                e.type.name() == 'PLAYER_DEATH' ? 'death' : 'custom'}">
                                <span th:text="${
                                    e.type.name() == 'PVP_KILL' ? '⚔' :
                                    e.type.name() == 'BOSS_KILL' ? '🐉' :
                                    e.type.name() == 'ACHIEVEMENT' ? '★' :
                                    e.type.name() == 'SERVER_MILESTONE' ? '⚑' :
                                    e.type.name() == 'PLAYER_DEATH' ? '☠' : '•'}">•</span>
                            </div>
                            <div class="event-content">
                                <div class="event-desc" th:text="${e.description}">Event description</div>
                                <div class="event-time" th:text="${e.occurredAt.atZone(T(java.time.ZoneId).systemDefault()).toLocalDateTime().toString().replace('T', ' ').substring(0, 16)}">2026-01-01 12:00</div>
                            </div>
                        </li>
                    </ul>
                    <div class="empty-state" th:if="${#lists.isEmpty(recentEvents)}">No events yet.</div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
