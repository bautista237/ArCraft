<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Rankings — ArCraft</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .rankings-table-wrapper { overflow-x: auto; }
        .data-table th a { white-space: nowrap; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar('rankings')}"></div>

    <main class="page-content">
        <h2 class="page-title">Player Rankings</h2>

        <div class="panel">
            <div class="panel-body rankings-table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Player</th>
                            <th class="text-right">
                                <a th:href="@{/rankings(sort='kills')}" th:classappend="${currentSort == 'kills'} ? 'active-sort'">Kills</a>
                            </th>
                            <th class="text-right">
                                <a th:href="@{/rankings(sort='deaths')}" th:classappend="${currentSort == 'deaths'} ? 'active-sort'">Deaths</a>
                            </th>
                            <th class="text-right">
                                <a th:href="@{/rankings(sort='kd')}" th:classappend="${currentSort == 'kd'} ? 'active-sort'">K/D</a>
                            </th>
                            <th class="text-right">
                                <a th:href="@{/rankings(sort='blocksMined')}" th:classappend="${currentSort == 'blocksMined'} ? 'active-sort'">Blocks Mined</a>
                            </th>
                            <th class="text-right">
                                <a th:href="@{/rankings(sort='blocksPlaced')}" th:classappend="${currentSort == 'blocksPlaced'} ? 'active-sort'">Blocks Placed</a>
                            </th>
                            <th class="text-right">
                                <a th:href="@{/rankings(sort='mobsKilled')}" th:classappend="${currentSort == 'mobsKilled'} ? 'active-sort'">Mobs Killed</a>
                            </th>
                            <th class="text-right">
                                <a th:href="@{/rankings(sort='itemsCrafted')}" th:classappend="${currentSort == 'itemsCrafted'} ? 'active-sort'">Items Crafted</a>
                            </th>
                            <th class="text-right">
                                <a th:href="@{/rankings(sort='distance')}" th:classappend="${currentSort == 'distance'} ? 'active-sort'">Total Distance</a>
                            </th>
                            <th class="text-right">
                                <a th:href="@{/rankings(sort='accuracy')}" th:classappend="${currentSort == 'accuracy'} ? 'active-sort'">Bow Accuracy</a>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s, iter : ${players}">
                            <td class="rank" th:text="${iter.index + 1}">1</td>
                            <td>
                                <a class="player-link" th:href="@{/players/{u}(u=${s.player.username})}"
                                   th:text="${s.player.username}">Steve</a>
                            </td>
                            <td class="num text-right" th:text="${s.kills}">0</td>
                            <td class="num text-right" th:text="${s.deaths}">0</td>
                            <td class="num text-right" th:text="${s.deaths == 0 ? s.kills : T(java.lang.String).format('%.2f', s.kills * 1.0 / s.deaths)}">0.00</td>
                            <td class="num text-right" th:text="${#numbers.formatInteger(s.blocksMined, 1, 'COMMA')}">0</td>
                            <td class="num text-right" th:text="${#numbers.formatInteger(s.blocksPlaced, 1, 'COMMA')}">0</td>
                            <td class="num text-right" th:text="${#numbers.formatInteger(s.mobsKilled, 1, 'COMMA')}">0</td>
                            <td class="num text-right" th:text="${#numbers.formatInteger(s.itemsCrafted, 1, 'COMMA')}">0</td>
                            <td class="num text-right" th:text="${#numbers.formatInteger(s.distanceWalked + s.distanceSwum + s.distanceFlown + s.distanceSailed, 1, 'COMMA')}">0</td>
                            <td class="num text-right" th:text="${s.shotsFired == 0 ? '0%' : T(java.lang.String).format('%.1f%%', s.shotsHit * 100.0 / s.shotsFired)}">0%</td>
                        </tr>
                    </tbody>
                </table>
                <div class="empty-state" th:if="${#lists.isEmpty(players)}">No players yet.</div>
            </div>
        </div>
    </main>
</body>
</html>
