<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Navbar fragment -->
<header th:fragment="navbar(activePage)" class="navbar">
    <div class="logo">
        <span class="ar">Ar</span><span class="craft">Craft</span>
    </div>
    <nav>
        <a th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active'">Dashboard</a>
        <a th:href="@{/rankings}" th:classappend="${activePage == 'rankings'} ? 'active'">Rankings</a>
    </nav>
    <div class="user-section">
        <span class="username" th:text="${#authentication.name}">player</span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-logout">Sign Out</button>
        </form>
    </div>
</header>

</html>
